<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Simple</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .game-info {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            color: white;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 18px;
            min-width: 150px;
        }

        canvas {
            border: 3px solid white;
            background: #000;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .controls {
            color: white;
            margin-top: 20px;
            font-size: 14px;
        }

        .button-row {
            margin-top: 15px;
        }

        button {
            background: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }

        button:hover {
            background: #667eea;
            color: white;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 TETRIS</h1>
        
        <div class="game-info">
            <div class="info-box">
                Puntuació: <span id="score">0</span>
            </div>
            <div class="info-box">
                Línies: <span id="lines">0</span>
            </div>
        </div>

        <canvas id="tetrisCanvas" width="200" height="400"></canvas>

        <div class="controls">
            <p>
                ← → Per moure<br>
                ↑ Per rotar<br>
                ↓ Per baixar
            </p>
            <div class="button-row">
                <button onclick="game.togglePause()">Pausa</button>
                <button onclick="location.reload()">Nou Joc</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');

        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = canvas.width / COLS;

        const PIECES = [
            { shape: [[1, 1, 1, 1]], color: '#00f0f0' },
            { shape: [[1, 1], [1, 1]], color: '#f0f000' },
            { shape: [[1, 1, 1], [1, 0, 0]], color: '#f000f0' },
            { shape: [[1, 1, 1], [0, 0, 1]], color: '#00f000' },
            { shape: [[1, 1, 1], [0, 1, 0]], color: '#f0a000' },
            { shape: [[0, 1, 1], [1, 1, 0]], color: '#f00000' },
            { shape: [[1, 1, 0], [0, 1, 1]], color: '#0000f0' }
        ];

        let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let lines = 0;
        let gameOver = false;
        let paused = false;
        let lastTime = 0;
        let dropCounter = 0;
        let dropInterval = 1000; // drop piece every 1000ms

        class Piece {
            constructor(shapeObj) {
                this.shape = JSON.parse(JSON.stringify(shapeObj.shape));
                this.color = shapeObj.color;
                this.x = Math.floor(COLS / 2) - Math.floor(this.shape[0].length / 2);
                this.y = 0;
            }

            rotate() {
                const rotated = this.shape[0].map((_, i) =>
                    this.shape.map(row => row[i]).reverse()
                );
                if (!this.collides(this.x, this.y, rotated)) {
                    this.shape = rotated;
                }
            }

            collides(x, y, shape = this.shape) {
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const newX = x + col;
                            const newY = y + row;
                            if (newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX])) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            move(dx) {
                if (!this.collides(this.x + dx, this.y)) {
                    this.x += dx;
                }
            }

            moveDown() {
                if (!this.collides(this.x, this.y + 1)) {
                    this.y++;
                    return true;
                }
                return false;
            }

            place() {
                for (let row = 0; row < this.shape.length; row++) {
                    for (let col = 0; col < this.shape[row].length; col++) {
                        if (this.shape[row][col]) {
                            const y = this.y + row;
                            if (y >= 0) {
                                board[y][this.x + col] = this.color;
                            }
                        }
                    }
                }
            }
        }

        function newPiece() {
            if (!nextPiece) {
                nextPiece = new Piece(PIECES[Math.floor(Math.random() * PIECES.length)]);
            }
            currentPiece = nextPiece;
            nextPiece = new Piece(PIECES[Math.floor(Math.random() * PIECES.length)]);

            if (currentPiece.collides(currentPiece.x, currentPiece.y)) {
                gameOver = true;
            }
        }

        function clearLines() {
            let clearedLines = 0;
            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell)) {
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(0));
                    clearedLines++;
                }
            }
            if (clearedLines > 0) {
                lines += clearedLines;
                score += clearedLines * 100;
                document.getElementById('score').textContent = score;
                document.getElementById('lines').textContent = lines;
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // Draw board
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col * BLOCK_SIZE + 1, row * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    }
                }
            }

            // Draw current piece
            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                for (let row = 0; row < currentPiece.shape.length; row++) {
                    for (let col = 0; col < currentPiece.shape[row].length; col++) {
                        if (currentPiece.shape[row][col]) {
                            const x = currentPiece.x + col;
                            const y = currentPiece.y + row;
                            if (y >= 0) {
                                ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                            }
                        }
                    }
                }
            }

            // Draw game over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            }

            if (paused && !gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2);
            }
        }

        const game = {
            update() {
                if (gameOver || paused) return;

                if (!currentPiece) {
                    newPiece();
                } else if (!currentPiece.moveDown()) {
                    currentPiece.place();
                    clearLines();
                    newPiece();
                }
            },

            togglePause() {
                if (!gameOver) paused = !paused;
            },

            loop(timestamp = 0) {
                if (lastTime === 0) {
                    lastTime = timestamp;
                }
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;

                if (!paused && !gameOver) {
                    dropCounter += deltaTime;
                    if (dropCounter >= dropInterval) {
                        this.update();
                        dropCounter = 0;
                    }
                }

                draw();
                requestAnimationFrame((time) => this.loop(time));
            },

            start() {
                newPiece();
                this.loop();
            }
        };

        document.addEventListener('keydown', (e) => {
            if (gameOver || paused || !currentPiece) return;

            if (e.key === 'ArrowLeft') currentPiece.move(-1);
            else if (e.key === 'ArrowRight') currentPiece.move(1);
            else if (e.key === 'ArrowUp') currentPiece.rotate();
            else if (e.key === 'ArrowDown') {
                game.update();
                dropCounter = 0;
            }
        });

        game.start();
    </script>
</body>
</html>
